<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>1vs1 Online Dama</title>
    
    <link rel="manifest" href="/manifest.json">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>🎮 1vs1 DAMA</h1>
        
        <div class="user-info">
            <div class="username-container">
                <span class="username-label">👤 İsim:</span>
                <span id="usernameDisplay" class="username-display">Oyuncu-</span>
                <button id="editUsernameBtn" class="edit-username-btn">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </div>
            <div id="userStatus" class="user-status">🟢 Çevrimiçi</div>
        </div>

        <div id="editUsernameModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>İsmini Değiştir</h3>
                <input type="text" id="newUsernameInput" placeholder="Yeni ismin..." maxlength="20">
                <div class="modal-buttons">
                    <button id="saveUsernameBtn" class="modal-btn save-btn">Kaydet</button>
                    <button id="cancelUsernameBtn" class="modal-btn cancel-btn">İptal</button>
                </div>
            </div>
        </div>

        <div id="lobbyControls" class="lobby-controls">
            <div class="lobby-card">
                <h3><i class="fas fa-plus-circle"></i> Yeni Oda</h3>
                <button id="createRoomBtn" class="main-btn create-btn">ODA KUR</button>
            </div>
            <div class="lobby-divider">VEYA</div>
            <div class="lobby-card">
                <h3><i class="fas fa-sign-in-alt"></i> Odaya Katıl</h3>
                <input type="text" id="roomCodeInput" placeholder="Oda Kodunu Gir..." maxlength="6">
                <button id="joinRoomBtn" class="main-btn join-btn">KATIL</button>
            </div>
        </div>

        <div id="gameArea" class="game-area" style="display: none;">
            <div class="game-header">
                <div class="room-info">
                    <span class="label">ODA KODU:</span>
                    <span id="roomCode" class="code-val">-</span>
                </div>
                <div id="turnIndicator" class="turn-indicator">
                    <span id="gameStatus">Oyuncular bekleniyor...</span>
                </div>
            </div>

            <div class="game-layout">
                <div class="side-panel">
                    <div class="players-list" id="players">
                        </div>
                    
                    <div class="captured-section">
                        <h4><i class="fas fa-trophy"></i> Yenen Taşlar</h4>
                        <div id="capturedPieces" class="captured-pieces-container"></div>
                    </div>
                </div>

                <div class="board-container">
                    <div id="board" class="board"></div>
                </div>

                <div class="chat-sidebar">
                    <div class="chat-header">
                        <h3><i class="fas fa-comments"></i> Genel Sohbet</h3>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="chat-welcome">
                            <i class="fas fa-hand-wave"></i> Sohbete hoşgeldin!
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Mesaj yaz..." maxlength="200">
                        <button id="sendChatBtn" class="send-chat-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="gameOverlay" class="game-overlay" style="display: none;">
            <div class="overlay-content">
                <h2 id="winnerText"></h2>
                <button id="playAgainBtn" class="play-again-btn">🔄 TEKRAR OYNA</button>
                <button id="backToLobbyBtn" class="back-btn">🏠 ANA SAYFA</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
