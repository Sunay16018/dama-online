<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1vs1 Online Dama - Sohbetli</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>🎮 1vs1 DAMA</h1>
        
        <!-- Kullanıcı Bilgisi -->
        <div class="user-info">
            <div class="username-container">
                <span class="username-label">👤 İsim:</span>
                <span id="usernameDisplay" class="username-display">Oyuncu-1234</span>
                <button id="editUsernameBtn" class="edit-username-btn">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </div>
            <div id="userStatus" class="user-status">🟢 Çevrimiçi</div>
        </div>

        <!-- İsim Düzenleme Modalı (Alert YOK) -->
        <div id="editUsernameModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>İsmini Değiştir</h3>
                <input type="text" id="newUsernameInput" placeholder="Yeni ismin..." maxlength="20">
                <div class="modal-buttons">
                    <button id="saveUsernameBtn" class="modal-btn save-btn">Kaydet</button>
                    <button id="cancelUsernameBtn" class="modal-btn cancel-btn">İptal</button>
                </div>
            </div>
        </div>
        
        <div class="room-controls" id="lobbyControls">
            <input type="text" id="roomCodeInput" placeholder="ODA KODU" maxlength="6" autocomplete="off">
            <button id="createRoomBtn">🎲 ODA OLUŞTUR</button>
            <button id="joinRoomBtn">🚪 ODAYA KATIL</button>
        </div>
        
        <div id="status" class="status">🔌 Sunucuya bağlanıyor...</div>
        
        <!-- SOHBET BUTONU -->
        <button id="toggleChatBtn" class="toggle-chat-btn">
            <i class="fas fa-comment"></i> Sohbeti Göster
        </button>
        
        <!-- ANA İÇERİK -->
        <div class="main-content">
            <!-- OYUN ALANI -->
            <div id="gameArea" style="display: none;">
                <div class="game-header">
                    <div id="roomCode" class="room-code-badge"></div>
                    <div class="player-indicator" id="playerTeam"></div>
                    <button id="leaveRoomBtn" class="leave-btn">🏠 ANA SAYFA</button>
                </div>
                
                <div class="game-content">
                    <div class="board-wrapper">
                        <div class="board" id="board"></div>
                    </div>
                    
                    <div class="info-panel">
                        <div id="turnIndicator" class="turn-indicator">---</div>
                        <div id="players" class="players-list"></div>
                        <div id="gameStatus" class="game-status"></div>
                        <div id="capturedPieces" class="captured-pieces-container"></div>
                    </div>
                </div>
                
                <div id="gameOverlay" class="game-overlay" style="display: none;">
                    <div class="overlay-content">
                        <h2 id="winnerText"></h2>
                        <button id="playAgainBtn" class="play-again-btn">🔄 TEKRAR OYNA</button>
                        <button id="backToLobbyBtn" class="back-btn">🏠 ANA SAYFA</button>
                    </div>
                </div>
            </div>
            
            <!-- SOHBET ALANI -->
            <div id="chatArea" class="chat-area" style="display: none;">
                <div class="chat-header">
                    <h3><i class="fas fa-comments"></i> Genel Sohbet</h3>
                    <button id="closeChatBtn" class="close-chat-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <!-- Mesajlar buraya gelecek -->
                    <div class="chat-welcome">
                        <i class="fas fa-hand-wave"></i> Sohbete hoşgeldin! Mesajlaşmaya başlayabilirsin.
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Mesajını yaz... (Enter gönder)" maxlength="200">
                    <button id="sendChatBtn" class="send-chat-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="chat-info">
                    <i class="fas fa-info-circle"></i> {isim} yazarak gönder, herkes görür
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
